front:
  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0040_WYG_000-1a, image: WYG0743/WYG0743-0117a.png}
body:
  text: 提要産育寶慶方二卷醫家類臣等謹案産育寶慶方二卷不著撰人名氏宋史藝文志以為郭稽中撰考陳振孫書録解題稱濮陽李師聖得産論二十一篇有説無方醫學教授郭稽中為時良醫以方附諸論末遂為完書則稽中特因師聖所得舊本増以新方非所自撰宋史所載似未見陳氏説也然稽中所増合原論共為一卷與此本不合以卷首諸序考之葢括蒼陳言撰三因方嘗取其方論各評得失婺醫杜荍因採所評附入各條之下後趙瑩得産乳備要増以楊子建七説合於産論為一集有冀致君者又掇御藥院雜病方論及入月産圗體𤣥子借地法安産藏衣方位綴于其末是輾轉増益已非郭氏之舊特沿其舊名耳其書世罕傳本今載於永樂大典者得論二十一陳言評十六方三十四為一卷産乳備要暨經氣姙娠等證方六十二為一卷其體𤣥子借地法永樂大典佚不載今亦闕焉按胎教之法古人所重賈誼新書所引青史之說劉向列女傳所記太任育文王之事尚可見其崖畧惟産育方藥則罕專書唐書藝文志有䀤殷産寶一卷始别立一門今其書不傳則講姙育者當以是書為最古矣卷中惟陳言之論標識姓名餘皆不標為誰説今以原本體例推之上卷之方皆出郭氏下卷娩乳安産經氣三條外殆即楊氏之説所附方藥殆即冀致君所採御藥院方也陳言有三因方已著録楊子建名倓有楊氏家藏方今未見李師聖等皆南宋人冀致君序稱諸人為宋儒又稱近在燕趙間盖元人云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序人有一念之善可以動天地感鬼神至其充大之則利益於世奚有限量人惟溺於私欲雖有善念爾汝其心差殊其見畦畛其用險隘偏小不足觀矣趙君徳修公族之賢者其為人也用心平處已正議論不阿曲事無纎巨一歸於是每念貧而病者艱於得藥惠施周急常恐不及非吉人為善惟日不足者乎今又取諸家産方之得效者集為一編鋟木廣施善念之充若火之然若泉之逹莫之能禦則是方一出見者用者活者將不可勝計其利􅄎哉與世之有藥而不施施藥而秘其方者天淵矣劉四垣序右産育寳慶集方郭稽中纂李師聖作序于山甫印施余始宦歴陽而師聖憲淮西山甫時侍因得數帙始置篋笥未窺其妙洎余室家蓐中不豫初苦寒熱殆如瘧狀及閱此方得其増損四物湯適中其病製之以服至再而愈嘗復苦腹痛㵼痢又得第十論調中湯服之不再而頓止異時蓐後復苦痞悶咽乾因詰其證果復渴甚中夜得見睍丸方待旦置藥旋成纔服既噫已安矣自是余家頗神此方往往因人傳授及付以方無不獲效頃在淝訪表舅李師禮及門且久聞妾在蓐方病危篤嘔吐脹滿粥藥不下因語此方遍索之不得徳邵兄領學事淮右聞之遍令公皂購之始得印本于醫家乃李憲攝帥日施於郡人者也尋得大聖散合成姑試服而不嘔良久與粥凡三服而無恙師禮以為神亟欲鏤板但未得其全本余欲刋施而未暇近以海陵親戚間有患崩中不止者須臾眼黑眩暈殆至悶死時篋中偶有清魂散急遺灌之良久稍蘇再進遂安益信此方之妙無不獲效者中間止餘一帙以嘉禾相知借去遂亡其本每以為恨後十餘年與山甫相遇都城時方在圍中雖憂惴百不暇及首詢此板屬以居相近因得印之復以此本遺山甫因書於後王晉序婦人産育雖曰常事其實甚危調䕶或失其宜藥石或乖其用則為害不細此前輩所以諄諄於方論之間也余友人得産乳備要乃盱江傅君教授常刋於澧陽郡庠因以家藏書本稍加校正増以楊子建七説并産論同為一集鋟木以廣之庶幾有補於萬一云趙瑩序醫家者流嘗謂寧治百男子不治一婦人况産婦乎蓋療産婦之證為難而産前之證尤難胎氣既成世之人徒知以十月為産期而不知有過期之産者宋儒已論之詳矣亦謂之常而不謂之變甚哉異人異書之為可重此産育寳慶之書所以増廣其傳也書既刋行徳修命題其後余憮然曰是書之出無患其不傳吾聞君子居其室出其言善則千里之外應之今子處獨善之時而有兼善之心不其大矣乎將見不期應而應之至是可喜也寓齋老人序山野草澤間苦無素業醫流妙手産媪是書足以備一時緩急之用觀此前序足見其人矣頤齋老人題姙娠之理内經定以十月為正産者尚矣間有過期者蓋古之賢聖之生如此然聞其語未見其人也比年以來姙之過産者逺者不得而知近在燕趙間時復有之方姙之初也信其為姙及其過産則反疑其非姙也問之産媼則曰未之見也問之名醫則日出月出月者貴問之方士則曰妖也以妖治之問之庸醫則曰病也以病治之二者俱失至有子母俱不救者既而方知其姙也雖悔其可追耶余聞之甚可悼矣恨無可考之方以破其惑也一日過醫公李寧之家示一書曰産育寳慶集披讀一二蓋宋儒李師聖郭稽中楊子建輩之所編集至生産篇云婦人懷胎有七月八月九月至十月而産者亦有經一年至二年三年四年五年而後産者蓋人之生隂注陽定自有時日不可改移今獨限以十月似為未盡讀不終篇不覺屢歎惜乎此書在世希有若能廣傳使天下共知人生安得罹殤夭之禍乎意謂婦人方經雖多而産書難其全者若是一或廢失世間必不復有也因問誰氏之書公曰外郎楊士表所秘藏也輙親往謁告以情實求之忻然見許遂得原書印本方議刋行公曰此止一産書也若更將御藥院雜病方論并入月産圖體𤣥子借地法安産藏衣方位附之合為一集可為完書矣余喜從之猶恐有錯謬未盡者更命諸名醫復加校正余謂公曰書則完矣病如之何參謀周徳甫聞之毅然贊成遂命工刋行自今以始庶令姙婦得安産媼無失家自可以修藥人自可以為醫來者可知而傳之愈廣矣兾致君序余收産論二十一篇議論精確無所不究蓋國醫博士極方書所得之妙惜乎有其說而無其方郭君稽中為時良醫尤長於治産故其切脉用藥屢獲竒效一日願以所收家方附於諸論之末遂為完一真集益濟衆之異書也古人謂為人子而不學醫者為不孝則有方論而不傳於世者其可謂之仁哉李師聖序欽定四庫全書産育寳慶集目録卷上産論二十一篇評十六篇卷下産乳備要産圖方論

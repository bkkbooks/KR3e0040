body:
  text: 産育寶慶集卷下宋李師聖等編産乳備要娩乳大故方書浩博自非素習誰能適從危殆之間頗艱應用今採托諸方論中將護要法及預備經效要用湯藥名曰産乳備要務從簡易以救倉卒凡産婦合要備急湯藥並須預先修合題號恐臨時倉卒難致臨月慎勿多飲酒即依産圖方位擇深靜房室入月一日即貼借地法於房內北壁薰令香潔安産藏衣方位此與太平聖惠方同但彼以支言而此以干言故兩存之正月丙位安産吉壬位藏衣吉丁天德藏衣吉二月甲位安産吉庚位藏衣吉坤天德藏衣吉三月壬位安産吉丙位藏衣吉壬天德藏衣吉四月庚位安産吉甲位藏衣吉辛天德藏衣吉五月丙位安産吉壬位藏衣吉乾天德藏衣吉六月甲位安産吉庚位藏衣吉甲天德藏衣吉七月壬位安産吉丙位藏衣吉癸天德藏衣吉八月庚位安産吉甲位藏衣吉艮天德藏衣吉九月丙位安産吉壬位藏衣吉丙天德藏衣吉十月甲位安産吉庚位藏衣吉乙天德藏衣吉十一月壬位安産吉丙位藏衣吉巽天德藏衣吉十二月庚位安産吉甲位藏衣吉庚天德藏衣吉凡欲生産切不得喧閙産婦房門常須關閉選一年髙性和善産婆又選穩審謹慎家人一兩人扶持切不用揮霍致令産婦憂恐又忌間雜外人喪孝穢濁之人瞻視若不慎之定是難産小兒若於腹中痛來但令扶行或行不得且立候行得便行或痛作陳眼中如火生此是兒回轉即進琥珀散一服直至行不得即扶上蓐草務要産婦惜力或心中熱閙取白蜜一匙新汲水調下或未解即吞生雞子一枚琥珀散治産後惡血不盡結聚小腹疼痛琥珀半兩當歸三分銼微炒沒藥半斤青橘皮半兩湯浸去白瓤焙赤芍藥半兩木香半兩桂心半兩香附子一兩右藥搗細為散不計時候以豆淋酒調下一錢若産後心空但時與琥珀散一服或煎芍藥湯進之更不用他治常進溫粥慎勿與熱食熱食則滯血或三五日內但覺腹中􅂒痛兒枕未定即進定痛散二服芍藥湯治産後因血不快利氣上攻心腹疼痛芍藥二兩黃耆銼白芷人參芎藭切炒生乾地黃焙甘草炙各一兩白茯苓去黑皮一兩半右為粗末每服三錢匕水一盞煎取七分去滓入酒少許溫服不拘時候芍藥湯治産後虛乏不思飲食四肢昏倦心腹陳痛補虛治氣當歸一兩半切焙人參肉桂生薑後入甘草炙各一兩芍藥一兩右為末每服三錢水二盞入棗二枚煎至一盞去滓溫服日三次定痛散治産後惡血不止腹內熱痛不可忍及兒枕未定當歸切焙芍藥各二兩桂心一兩或以川芎代之右為末每服二錢水酒共一盞生薑一塊彈子大拍破同煎至六分去滓溫服夫人生産自有時候痛不甚者名曰試痛宜須强行熟忍宜食軟飯若食飯不得即宜食粥及飲蜜漿勿令飢渴恐産婦無力困乏若經時不産進通靈散一服若生畢暖少許醋墨與呷以童子小便調七寶散一服心中自然開爽不住燒磚石以醋沃之直至七日要令産婦鼻中常聞醋氣宜燒茅香白术皂莢等物慎勿令見穢惡若産訖忽覺心中昏悶或眼花如在舟車中即是血暈急須服牡丹飲子黑神散通靈散催生用蛇蛻皮一條全者緊捲以蚯蚓泥裹燒黑近藥處泥些少用不妨細研為末每服一錢溫酒調下又方治産後惡血不下兒枕不散小腹疼痛細墨濃研半盞好醋半盞沒藥一分右用童子小便少許同煎五七沸溫服不拘時候七寶散治初産後勻血和氣補虛壓驚悸硃砂研如粉桂心乾薑炮當歸切焙川芎人參羚羊角灰茯苓各等分右各杵為細末若産婦平和三臘以前直至滿月每日各取一字匕以羌活豆淋酒調下空心服若覺心胸煩熱即减薑桂冷即加之腹痛加當歸心悶加羚羊角心中虛氣加桂不下食或惡心加人參虛戰加茯苓以意斟酌日二夜一服不飲酒者以童子小便溫調下牡丹引子方缺黑神散防暈備急驢護肝不計多少以桑柴火燒以刀刮取黑煤更刮令盡研細入真麝香少許如才産了及覺血上衝心暈悶取一錢以熱酒和童子小便調下薑粉散才産服此藥蕩盡兒枕除百病源當歸官桂不得見火人參茯苓甘草芍藥知母川芎大黃略炒黃耆木香草豆蔲白术訶子髙良薑青橘皮去瓤熟地黃少許右除地黃外各等分焙乾次用附子一箇中樣半兩者炮製入衆藥生薑一片研取自然汁於碗器中停留一食久傾去清汁取下靣粉腳攤在蒻葉中入焙籠焙乾共合地黃搗羅為末才産後用末三錢水一盞薑三片棗一箇擘開同煎至七分乘熱喫喫後自然産母睡著半日以來睡覺再服全除却腹痛一日只可三服至九服不可多服肚中冷也當歸血竭丸治婦人産後惡物不下結聚成塊心胸痞悶臍下堅痛當歸炒銼血竭蓬莪蒁炮芍藥各二兩五靈脂四兩右為細末醋麵糊丸桐子大每服四十丸溫酒下或溫粥飲下空心食前服烏金散治産後諸疾紅芍藥川當歸乾薑蒲黃甘草熟乾地黃各一分右各為末别用黑豆一合炒令香熟去皮除蒲黃與餘藥共杵為細末於銀器中漫火炒紫色後入蒲黃如産後别無疾每日服一盞豆淋酒調下更不生諸疾若稍有不安服即愈如産後血逆心悶腹搊痛一兩服立止血竭散治産後百疾血竭沒藥翦碎右等分輕手研細頻篩再研取盡為度每服二錢用小便合細酒半大盞煎一沸溫調下才産下一服上床良久再服其惡血自循下行更不衝上免生百疾保安丸治産前産後三十六種冷血氣半身不遂手腳疼痛諸疾並宜服之赤茯苓去皮牡丹皮白芍藥各三分吳茱萸沉香各一分人參去蘆當歸洗切焙桂去皮牛膝酒浸香白芷木香藳本去蘆麻黃去根節川芎附子炮去皮臍細辛揀净蘭香葉甘草炙銼寒水石燒防風去蘆桔梗去蘆蟬殼去足翅各半兩馬鳴退一兩炙生乾地黃一兩右為細末煉蜜為丸如小彈子大每日空心用溫酒化下一丸療八風十二痺疝瘕乳房中風淋血積聚并治胎不安子死腹中不過三丸可下死胎生衣不出一丸便效産前産後痢并赤白帶下及嘔逆填心疾氣煩滿一丸差産後或産前腹中疼痛繞臍下如刀刺相似一丸便止盡難月可日一服至産不覺疼痛産前傷寒中風體如板煎麻黃湯化下一丸立效經脉不通或頻併或赤白喫食無味瘐惡乍寒乍熱靣赤唇焦手足煩疼遍身黑㸃血斑一切病眼此藥悉愈每一丸細嚼宜空心溫酒送下二聖散治産前安胎産後惡血不盡及胎衣不下羌活川芎等分右為細末每服二大錢酒少許水七分沸調溫服方治産後血痛如刀刺熟乾地黃橘皮等分右為末每服一錢粥飲調下尋常痛發可常服方治産後頭痛大全良方作竒散大川芎為末每服二錢水一盞煎至七分溫服立差方治産後咳逆石蓮十箇炒熟丁香十箇右為末用米三合煎十沸溫服方治産後咳逆不止狗膽一箇硇砂丁香五靈脂各少許右為末以狗膽丸如白豆大每服一丸生薑水磨下方治産後小便不通右用蔥爛搗蜜調以紙花貼臍下若三日後覺壯熱頭痛此是乳脉行即進玉露散二服或大小便祕澀或發寒熱頭痛四肢如碎此是蓐勞或産後大渴胎損吹妳咳嗽别生他疾及帶起宿患亦宜檢尋别方治之月內不宜多笑强起離床行或作針線運動恣食生硬不避風脫衣洗當時雖無大損滿月後或成蓐勞手腳及腰腿酸重冷痛骨髓間颼颼如風吹縱有明醫卒不能療大都産婦將息須是百日方可平復大慎犯觸因此多致身體强直如角弓反張名曰蓐風遂至不救小可虛羸失於將補便成大患終身悔不及矣慎之慎之玉露散治産後乳脉行煩熱或大腸滯澀肌體疼痛凉膈壓熱下乳茯苓人參甘草炙各半兩桔梗白芷川芎各一兩川大黃當歸炒各一分芍藥三分右為末每服二平錢水一盞煎至七分溫服日三若臟腑泄㵼即除大黃湧泉散下妳川山甲半兩醋浸炒令輕空脂麻退皮一合胡桃二箇敲去殼湯浸去皮肉豆蔲麵包火內炮令麵焦去麵不用增損四物湯與十便良方同云治産後乍寒乍熱無他痛處者隂陽不和只無人參當歸芍藥人參川芎乾薑各一兩甘草四錢炙右為末每服二錢水一盞生薑五片同煎至六分去滓微熱服不以時若産後四肢安和亦不用多喫酒藥緣氣虛禁持未得却多昏眩惟飲童子小便無妨且勿平身側臥夜常須一人看承令𥪡起兩膝卧睡即須頻喚覺虛羸困乏即空心進理中丸七寶散七日外恐喫粥無味或虛乏無力即爛煮羊肉汁黃雌雞汁作粥未可喫肉亦不可喫生及硬物便成積滯之患常以黑豆一升炒令烟出以酒五升澆淋入羌活一兩槌碎同浸常用此酒下藥或時飲一盞大辟風邪令諸疾不生理中丸方缺七寶散見前方治小兒傷食吐不止丁香一十粒巴豆一箇不出油只用殼􅒦砂仁五箇大烏梅一箇右為細末丸如黍米大每服二三丸煎藿香湯下乳後服經氣調治法論曰經候者經脉之常候血氣運行恆久之度也隂陽愆伏則月候失常以致太過不及乍多乍少或前或後隂氣乘陽胞寒氣冷血不運行故乍少陽氣乘隂血熱流散故乍多隂過於陽則期前來陽過於隂則期後至久則或崩漏不止斷絶不行至使靣色不澤臍腹時痛久不治之漸至虛損令人斷産漸生他疾此皆由衝任虛弱榮衛不調之所致也婦人賦柔弱之質易感易傷氣以榮養之血以滋潤之氣行則血隨而行氣滯則血凝而窒當調其隂陽順其血氣一有偏勝則經候不調百病生矣可不慎哉滋隂丹養血和氣理治榮衛充盛肌膚活血注顔久服大補衝任調順月經熟乾地黃生乾地黃人參白茯苓各二兩黃耆甘菊花枸杞子丹參柏子仁炒白芍藥各一兩右為細末煉蜜丸如桐子大每服五十丸米飲下空心食前日進二三服沒藥丸治婦人本經不調肌瘦發熱飲食减少沒藥茺蔚子乾薑蒼术川芎熟乾地黃白芍當歸各一兩血竭半兩右除血竭沒藥外㕮咀先炒茺蔚子焦黃色次下乾薑炒令黃次下蒼术微黃色次下川芎等藥並令微黃色與血竭沒藥等同為細末醋煮麵糊為丸桐子大每服五六十丸漸加至八九十丸空心食前溫酒或醋湯亦得日進二服地黃膏子治婦人本藏血氣衰乏困倦無力或發困熱飲食减少並宜服之熟地黃八兩净蜜十八兩右將熟地黃為末同蜜熬成膏子丸桐子大空心食前每服四五十丸溫酒下米飲亦得或作膏子酒化服不飲酒白湯亦得八珍散調和榮衛理順隂陽滋血養氣進美飲食人參川芎白芍藥熟地黃當歸茯苓甘草炙縮砂仁各等分右為粗末每服三錢水一大盞生薑七片棗三枚去核同煎三五沸去滓放溫空心日進二服萬病丸治婦人久虛血氣衰少怠惰嗜卧飲食不進肌體瘦悴精神不足十便良方名滋隂萬病丸鄭汝明産經名內補丸熟乾地黃當歸各四兩右為細末麵糊為丸如桐子大空心食前每服五十丸溫粥飲下大保生丸調和本氣治療諸疾滋補榮衛久服之大有功效人參藁本白茯苓當歸赤石脂白术生乾地黃白芷延胡索肉桂去皮白芍藥白薇川芎甘草炙沒藥牡丹皮各半兩右為細末蜜煉為丸彈子大空心食前每服一丸溫酒化下六神湯治脾氣不和榮衛不足怠惰困倦不嗜飲食服之補真養氣進食充肌當歸熟地黃川芎地骨皮黃耆白芍藥各一兩右為粗末每服五錢水一盞半煎至八分去滓空心溫服當歸沒藥丸治婦人真氣虛憊血氣極少不能榮養致使經氣不來或發寒熱飲食减少怠惰嗜卧以致勞虛當歸銼炒沒藥天仙子炒黑色乾薑炮蒼术炒黃色熟乾地黃川芎芍藥各等分右為細末麵糊為丸如桐子大每服五十丸溫粥飲下食前服活血散治衝任氣虛經事不調或多或少或前或後並皆治之當歸川芎白芍藥柴胡各四兩肉桂去粗皮二兩右為粗末每服五六錢水一盞半煎至七分去滓稍熱食後服詵詵丸治衝任不和子藏怯弱或經墮胎後氣不復此藥常服調和衝任氣血當歸熟地黃各一兩延胡索澤蘭葉各一兩半川芎赤芍藥白薇人參金叉石斛各一兩牡丹皮一兩右為細末醋麵糊為丸桐子大每服五十丸空心溫酒下或粥飲亦得加味四物湯治婦人衝任不調臍腹疼痛月事入時不來及衝任太過致使隂陽不和或發寒熱减食飲欲成勞病當歸地黃芍藥川芎各一兩柴胡半兩黃芩二錢半右㕮咀服食依前法地髓煎丸治婦人經氣不調虛煩發熱肌體瘦悴形羸弱困飲食不進欲成勞病熟乾地黃不計多少右為末蜜煉為丸桐子大每服五十丸空心食前溫粥飲下當歸地黃丸治婦人血氣不和月事不勻腰腿疼痛當歸熟地黃川芎白芍藥各二兩牡丹皮延胡索各兩一人參黃耆各半兩右為末煉蜜和丸桐子大每服三十丸米飲下食前日二服平養氣血滋血湯治婦人皮聚毛落心肺俱損血脉虛弱月水愆期益氣養血調進飲食人參白茯苓去皮熟乾地黃川芎當歸白芍藥黃耆乾山藥各一兩右為粗末每服五錢水一盞半煎至一盞去滓溫服滋榮丸治婦人本經衰弱愆期不來及有血結成塊臍下堅硬疼痛不消並宜治之熟乾地黃人參五味子赤芍藥當歸逺志去苗白茯苓去皮牡丹皮桂心藁本各一兩防風卷柏細辛山藥各半兩白术三錢右為細末鍊蜜和丸桐子大每服三十丸食前空心溫酒下日進三服當歸良薑散補養血氣去心腹疼悶脅肋脹滿經絡不調或赤白帶下腰腳疼痛一切痼疾髙良薑五兩厚朴二兩去皮薑製當歸二兩桂去皮二兩右為粗末每服二錢水一盞艾十葉同煎至七分去滓食前熱服抽刀散治婦人心腹脅肋疼痛不忍産前後亦用川烏頭炮去皮臍牡丹皮芍藥乾薑炮桂心沒藥當歸各等分右為細末每服二錢熱酒調下不過三服輕可一服産後加紅花禹餘糧散治氣血傷衝任虛損崩傷帶漏久而不斷或下如豆汁或成片如肝或五色相雜或赤白相兼臍腹冷痛靣體痿黃心忪悸動發熱多汗四肢困倦飲食减少禹餘糧醋淬伏龍肝赤石脂白龍骨牡蠣烏魚骨桂去皮浮石各等分右為末每服三錢煎烏梅湯調下食前服白多加牡蠣龍骨烏魚骨赤多加赤石脂禹餘糧黃多加伏龍肝桂心隨病加治禹餘糧丸治婦人諸疾方桂去皮禹餘糧燒醋淬龍骨人參紫石英川烏頭桑寄生杜仲去皮炒五味子逺志去心澤㵼當歸洗切焙石斛去根蓯蓉乾薑各二兩川椒去目炒出汁牡礪燒甘草炙右為末煉蜜為丸桐子大每服二十丸米飲下漸加至三十丸日三服五聖散調益榮衛滋養氣血治衝任虛損月水不調臍腹疼痛崩中漏下血瘕塊硬發歇俱疼妊娠宿冷將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下結生瘕聚少腹堅痛即作寒熱當歸熟乾地黃川芎白芍藥各一兩生乾地黃三兩右為末酒煮麵糊為丸桐子大每服六七十丸食前溫酒送下延齡護寶丸治婦人血藏虛損經候過多每行時暴下不可禁止因成崩中連日不斷致五臟空虛失色黃瘦崩竭暫止日少復發不耐動搖小勞輒極劇此藥但燈心服大有效禹餘糧石二兩燒醋淬七遍龍骨人參桂赤石脂紫石英研熟地黃杜仲去粗皮銼碎桑寄生續斷香白芷芎藭當歸銼炒逺志去心金叉石斛去根銼炒白茯苓去皮阿膠炒牡蠣五味子艾葉各一兩右為末煉蜜為丸桐子大每服四五十丸溫粥飲下空心食前服必效散治婦人本經不調及崩漏不止棕皮燒木賊二兩去節燒灰存性研細麝香一錢右為細末每服二錢食前溫酒調下方治內損吐血飛過麵不計多少微炒過濃磨細墨一茶腳調下二錢立效方治非時吐血刺芥連根洗净搗汁半盞飲之又方生地黃自然汁一盞槐花揀净一兩用地黃汁炒槐花候地黃汁盡花乾每用三五十粒細嚼之又方新綿半兩燒令存性分二服濃煎人參湯調下靈寶散治血氣刺痛引兩肋疼痛及痃癖刺氣丁香一錢半木香一錢半乳香一錢半當歸延胡索白芍藥各半兩右為末每服一錢溫酒調下食前服烏金散治血崩漏下最治産後血崩并小産血崩漏下棕櫚皮烏梅乾薑燒灰存性各等分右為末每服二大錢煎烏梅湯調溫服不以時旋覆花丸治停痰積飲在脅下久而不愈漸成大癖心腹脹滿羸瘦不能食食不消化喜睡乾嘔大小便或澀或利在腸中搖動有水聲或口乾好飲水漿兩脅疰痛服之必安久服除根旋覆花去莖桂去皮枳實麵炒去瓤人參各一兩乾薑炮芍藥白术各一兩一錢半赤茯苓狼毒川烏頭炮去皮臍礬石燒赤各一兩七錢半芫花醋浸炒乾吳茱茰湯浸去滑炒黃色橘皮細辛去苗葉大黃微炒黃芩去黑心厚朴去皮生薑製葶藶隔紙炒各七錢半甘遂炒半兩右為細末煉蜜和丸桐子大每服一十丸至二十丸不拘時候妊娠調養法螽斯丸治婦人無子術金城太守范羅謙上臣驗此術若服藥四十日無子請戮臣一家以令天下醫人又名賜子丸陳無擇三因方作秦桂丸施圓端效方作白薇丸附子生去皮臍白茯苓去黑皮白薇半夏湯洗七次杜仲去粗皮桂心秦艽厚朴去粗皮各三錢防風乾薑生牛膝沙參各二錢細辛去苗半兩人參四錢右為細末煉蜜丸如小豆大日服五十丸空心任下如覺無益稍加丸數為度如服七日後隂陽覺有娠三日後不可更服臣妻年二十七嵗無子服此藥有娠又殘藥與前太子中舍宇文妻李氏年四十嵗無子服此藥十三日有娠此藥名螽斯丸屢用屢驗此方不可不廣與人如夫不在家不可服凡女人妊娠若素虛羸血氣不足體中有風氣心下多痰水者欲有胎喜病阻其狀顔色如常脉理和順但覺肢體沉重頭目昏眩不思飲食惡聞食氣多噉醎酸中心憤憊不知患之所在以至三四月以後則大劇吐逆不能勝舉如有此證則宜服療阻病竹茹湯人參散地黃丸竹茹湯方缺人參散治初娠惡食嘔逆人參一兩枳殼三分麵炒去鬲厚朴薑汁塗炙甘草炙各半兩右為粗末每服四錢水一盞半入生薑彈子大一塊拍破同煎至七分去滓溫服不拘時候地黃丸方缺夫妊娠藏氣皆擁關節不利切不宜多睡食粘硬難化之物亦不須亂服湯藥大慎針灸惟須數步心神不得悲憂驚恐負重振動若覺胎臟不安腹中微痛心意煩悶四體昏倦宜服安胎順氣阿膠散近産月即服順胎保安散千金丸阿膠散治妊娠不問月數深淺因頓仆胎動不安腰腹痛或有所下或胎奔上刺心短氣熟乾地黃二兩細切艾葉切焙黃當歸切焙甘草炙芍藥川芎阿膠炙令燥色各一兩黃耆若虛羸加至一兩右為末每服四錢水一盞半煎至八分溫服若胸中冷逆氣加生薑五片棗五枚同煎服保安散治妊娠胎氣不安心腹疼痛當歸一兩半切焙人參一兩阿膠炙令燥甘草炙各半兩右為末每服三大錢水一盞半入蔥白一莖拍破煎至八分去滓食前溫服未定再服千金丸治産前後一切風冷血氣等候産前胎氣不安腰腹多疼四肢昏倦妊娠臨月預合下每日空心一服臨産五藏不痛易産蓐中不生諸疾兼治産後惡血不盡及胎衣不下憎寒壯熱吐逆煩悶皮膚虛腫或血暈狂迷眼見神鬼能補勻血氣金叉石斛别搗為細末秦艽川椒去子微炒細辛防風貝母麵炒微黃熟乾地黃切焙糯米甘草炙各一分當歸切焙大麻仁黃芩乾薑炮大豆蘖以黑豆生芽長二寸焙乾用各三分石膏半分右精擇為末以蜜煉成劑入臼中杵一千下分為七十二丸擇除破天德月德日合每服一丸溫酒調下産後産前赤白帶下溫酒嚼下産前後血氣薄荷湯嚼下月信不通當歸酒下臨産艱難或三五日難産及胎衣不下子死腹中橫生倒産死絶不語但心頭有熱氣用藥一丸京棗湯研化灌之下喉立差産後惡血不盡臍腹疼痛嘔吐壯熱憎寒煩悶月候不調或少肢體虛怠皮腹浮腫産血不止虛勞中風口噤不語半身不遂産前後赤白痢大小便祕澀血暈狂語頭痛靣色痿黃漸成勞瘦飲食無味並溫酒研下一丸産前臨月每旦一丸至臨産用當歸酒下一兩丸催生五藏不痛易生救生散安胎益氣易産人參半兩訶子濕紙裹煨令熟去核白术銼炒黃陳橘皮去白炒大麥蘖炒黃神麯細銼炒黃各半兩右為末每服二錢水一盞煎至六分空心溫服入月加一倍水二盞煎一盞溫服能令兒緊小乳母無患十月厥隂行令地氣不收冬氣不藏萬物反生時有濛霧人病關閉不禁心痛陽氣不收氣嗽孕婦多暴死忽墮胎之病宜服暖肝藥以治之治婦人胎動不安方無問太嵗但寅申年十月頻有濛霧凄清之化孕婦有胎動不安之病宜進後方方人參一分防風一分當歸一分五味子一分白术一分續斷一分川芎半兩桑寄生三分甘草三銖細辛三銖右為末每服一錢水一大盞煎至七分空心去滓服方治妊娠患時疾黃芩尖如錐者鬱金各一兩右為末每服一錢板藍根地黃水下汗出效未得汗再服即瘥夏子益衛生十全方內有白术一錢石脂散治妊娠㵼痢赤石脂六錢乾薑四錢糯米一合炒黃右為細末分為二服水二盞煎至一盞食前溫服戊巳丸治泄㵼水榖不分謂之飱泄方原缺

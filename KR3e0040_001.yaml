body:
  text: 産育寳慶集卷上宋李師聖等編第一論曰熱疾胎死腹中者何答曰因母患熱疾至六七日以後藏府極熱薰灼其胎是以致死縁兒身死冷不能自出但服黑神散煖其胎須臾胎氣溫煖即自出何以知其胎之已死但看産婦舌色青者是其騐黑神散桂心當歸芍藥甘草炙乾薑炮生地各一兩黑豆炒去皮二兩附子炮去皮臍半兩右為末毎服二錢空心溫酒調下一法無附子有蒲黄陳言評曰夫姙娠謂之重身二命係焉將理失宜皆能損胎不特病薰灼所致或因傾仆驚恐出入觸冐及素有癥瘕積聚壞胎最多候其舌青即知子死養胎論云面青舌赤母死子生青唇吐涎子母俱死又有雙懷二胎或一死一活其候尤難知是非臨期觀變未易預述不可不備述也然以黑神散溫胎未若補助産母使其氣正免致虚乏困頓胎自下矣催生丹殊勝黑神散催生丹治胎死腹中或産母氣乏委頓産道乾澁蒼术米泔浸二兩桔梗一兩陳皮六錢白芷桂心乾薑炮厚朴製南星炮附子炮去皮臍半夏湯洗七次茯苓芍藥各二兩杏仁炒去皮尖阿膠麩炒各二錢五分川芎錢半枳殻麩炒四錢南木香一錢甘草三錢炙當歸川烏頭炮去皮尖各二兩右為末毎服一大錢溫酒下覺熱悶用新汲水調白蜜服第二論曰難産者何答曰胎側有成形塊呼為兒枕子欲生時枕破與敗血裹其子故難産但服勝金散逐其敗血即自生若逆生横生並皆治之勝金散麝香一錢鹽䜴一兩用舊青布裹了燒令通紅急以乳槌碎為末右共為末取秤槌燒紅以酒淬之調下藥一錢七陳言評曰産難不只胎側有兒枕破與敗血裹凝隨其胎息因縁自有難易其遇横逆多因坐草太早努力過多兒轉未逮或已破水其血必乾致胎難轉若先露脚謂之逆先露手謂之横法當以微針刺之使自縮入即服神應黑散以固其血必自轉生養生方云倉皇之間兩命所係不可不廣傳蓋贊黑散之功也或以鹽搽兒脚底抓搔之神應黒𣪚治横生逆生難産百草霜香白芷各等分右為末每服二錢童子小便好醋各一茶脚許調匀更以沸湯浸四五分服止一服見功甚者再服即分娩矣一名烏金散第三論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所脹是故不得下治之稍緩脹滿腹中以次上衝心胷疼痛喘急者難治但服奪命丹以速去衣中之血血散脹消胎衣自下而無所患奪命丹附子半兩炮去皮臍牡丹皮一兩乾漆一分搗碎炒烟盡右為末釅醋一升大黄末一兩同熬成膏和藥丸如桐子大溫酒下五七丸不以時牛膝湯治産兒已出胞衣不下臍腹堅脹急痛甚及子死腹中不得出牛膝酒浸瞿麥各四兩滑石八兩當歸酒浸木通各六兩葵子五兩按陳言第三論評缺第四論曰産後血暈悶者何答曰産後氣血暴虚未得安静血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散即省清魂散澤蘭葉人參各一分荆芥穗一兩川芎半兩右為末溫酒熱湯各半盞調一琖急灌之下咽即開眼氣定省人事陳言評曰産後眩暈頃刻害人須量虚實為治若胷中宿有痰飲阻病不除産後多致眩暈又血盛氣弱氣不使血逆而上攻此等皆非清魂可療仍用半夏茯苓湯血壅須用牡丹皮散但駃藥尤難輙用當識輕重所謂擾乎可擾擾亦無擾若氣血平人因去血多致暈者芎藭湯尤佳半夏茯苓湯半夏湯洗三兩茯苓熟地各一兩陳皮細辛蘇葉川芎人參芍藥桔梗甘草各六錢右㕮咀毎服四大錢水二盞薑七片煎七分去渣空心服有客熱煩渴生口瘡者去陳皮細辛加前胡知母腹冷下利者去地黄入桂心炒胃中虚熱大便秘小便濇加大黄一兩八錢去地黄加黄芩六錢牡丹皮𣪚治産後血暈悶絶狼狽若口噤則須拗開灌之必效牡丹皮大黄蒸芒硝各一兩冬𤓰子半合桃仁三十七粒去皮尖右㕮咀毎服五錢水三盞煎至一盞半去渣入芒硝再煎分二服欲産先煎下以備緩急金匱以此治腸癰但分兩少異芎藭湯方見苐十三論第五論曰産後口乾痞悶者何答曰産後榮衞大虚血氣未定食麪太早胃不能消化麪毒結聚於胃脘上薰胷中是以口乾煩渴心下痞悶醫者不識認為胷膈壅滯以藥下之萬不得一但服見睍丸見睍丸薑黄京三稜蓽澄茄陳皮去白髙良薑人參蓬莪茂右七味等分為末用細切蘿蔔漫火煮令爛研細將汁煮糊丸桐子大蘿蔔湯下三十丸不以時陳言評曰産後口乾痞悶未必只因食麪或産母内積憂煩外傷躁熱飲食甘辛使口乾痞悶當隨其所因調之可也心煩宜四物湯去地黄加人參烏梅煎若外傷燥熱看病何經當隨經為治難以備舉飲食所傷見睍丸却能作效四物湯方見第六論第六論曰産後乍寒乍熱者何答曰隂陽不和敗血不散皆令乍寒乍熱産後血氣虚損隂陽不和隂勝則乍寒陽勝則乍熱隂陽相乘則或寒或熱若因産勞傷藏府血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則繆矣隂陽不和宜増損四物湯敗血不散宜奪命丹又問二者以何别之答曰時有刺痛者敗血也但寒熱無他證者隂陽不和也増損四物湯不一皆隨病加减増損四物湯當歸人參芍藥川芎炮薑各一兩甘草炙四錢右㕮咀毎服四錢水一盞薑三片煎六分去渣熱服奪命丹方見第三論陳言評曰乍寒乍熱榮衞不和難以輕議若其敗血不散豈止入脾肺二臟耶大抵一隂閉一陽即作寒熱隂勝故寒陽勝故熱只可云敗血循經流入閉諸隂則寒閉諸陽則熱血氣與衞氣解則休遇再㑹而復作大調經散五積散入醋煎佳大調經散治産後血虚惡露未消氣為敗濁凝滯榮衞不調隂陽相乘憎寒發熱或自汗或腫滿皆氣血未平之故也大豆炒去皮一兩半茯神一兩真琥珀一錢右為末濃煎烏頭紫蘇湯下五積散治感寒濕與脾胃氣閉腰腹痛及有積聚蒼术米泔浸一宿廿兩桔梗十兩陳皮六兩白芷甘草炙當歸各二兩川芎一兩半芍藥白茯苓半夏湯去滑各一兩麻黄去節春夏二兩秋冬三兩乾薑春夏三兩秋冬四兩厚朴薑製炒二兩枳殻桂分兩原缺右先將前十二味㕮咀微炒令香取出當風凉之入後枳殻桂朴三味同為細末毎服三錢水一盞薑三片棗二枚煎七分食前溫服産婦陣疎難産經二三日不生胎死腹中或産母氣乏委頓産道乾澁加順元散水七分酒三分煎相繼兩服氣血内和即瘥胎死者不過三服當下其順元散量産母虚實加减順元𣪚烏頭炮去皮尖二兩附子炮去皮尖天南星炮各一兩木香半兩右為末同前法煎此藥治内外感寒脉沉伏遲細手足冷毛髪恂慄傷寒隂證大啜一二杯氣和汗出即愈第七論曰産後四肢浮腫者何答曰産後敗血乘血停積於五臟循經流入於四肢流淫日深却還不得腐壊如水故令四肢靣目浮腫醫人不識便作水氣治之凡治水流多用導水藥極能虚人夫産後既虚又以藥虚之是為重虚往往多致夭枉但服調經散血行腫消即愈調經散没藥另研琥珀另研桂心赤芍當歸各一錢細辛麝香另研各半錢右為末毎服半錢七生薑汁溫酒各少許調匀服陳言評曰産後浮腫多端有自懐孕腫至産後不退者有産後失於將理外感風寒暑濕内作喜怒驚憂血與氣搏留滯經絡氣分血分不可不辨要當隨所因脉證治之宜得其情調經散治血分固效但力淺難憑不若吳茱萸湯枳實湯奪魄散大調經散皆要藥也加减吳茱萸湯治婦人藏氣本虚夙挾風冷胷膈滿痛腰脇絞刺嘔吐惡心飲食减少身靣虚浮惡寒戰慄或泄利不止少氣羸困及因生産藏氣暴虚邪冷内勝宿疾轉甚吳茱萸湯洗七次炒一兩半桔梗乾薑炮甘草炙麥冬去心防風細辛當歸酒洗炒半夏湯洗七次茯苓丹皮桂心各半兩右㕮咀毎服四錢水一盞半煎七分去渣空心熱服枳實湯治心下堅大如盤邊如旋盤水飲所作名曰氣分枳實麩炒去瓤一兩半白术一兩右㕮咀每服四錢水盞半煎七分去渣溫服腹中軟即散奪魄散治婦人産後虚腫喘促利便則愈生薑取汁白麪各三兩半夏七個湯洗去滑右以薑汁溲麪裹半夏為七餅子炙焦熟為末熱水調一錢小便利為效大調經散最治産後腫滿喘急煩渴小便不利方見第六論第八論曰産後乍見鬼神者何答曰心主身之血脉因産傷耗血脉心氣則虛敗血停積上干於心心不受觸遂致心中煩躁起卧不安乍見鬼神言語顛倒醫工不識呼為風邪如此治之必不得愈但服調經散毎服加生龍腦一捻得睡即安調經散方見第七論按陳言第八論評缺第九論曰産後不語者何答曰人心有七孔三毛産後血氣弱多致停積敗血閉於心竅神志不能明了又心氣通於舌心氣閉塞則舌亦强矣故令不語如此但服七珍散七珍散人參石菖蒲川芎熟乾地黄各一兩細辛一錢防風硃砂研各半兩右為末毎服一錢薄荷湯調下不以時按陳言第九論評缺第十論曰産後腹痛又瀉利者何答曰産後腸胃虚怯寒邪易侵若未滿月飲冷當風乘虚入流於盲膜散於腸脇故腹痛作陣或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脇䐜脹或走痛不定急服調中湯立愈若醫者以為積滯攻之則禍不旋踵謹之調中湯良薑當歸桂心芍藥附子炮川芎各一兩甘草炙半兩右㕮咀每服三錢七水三盞煎一盞去渣熱服陳言評曰産後下利非止一證當隨所因而調之既云飲冷當風何所不至寒熱風濕本屬外因喜怒憂思還從自性况勞逸饑飽皆能致病若其洞泄可服調中赤白帶下非此能愈各隨門類别有正方今録桃膠散白頭翁湯以備用餘從帶下門中選用之沉香桃膠散治産後利下赤白裏結後重㽲刺疼痛等證桃膠瓦上焙乾沉香蒲黄紙隔炒各等分右為末毎服二錢陳米飲調下空心服白頭翁湯治産後下利虛極白頭翁甘草阿膠各二兩黄連蘖皮去粗皮秦皮去粗皮各三兩右㕮咀毎服四錢水一盞半煎七分去渣空心服第十一論曰産後遍身疼痛者何答曰産後百節開張血脉流走遇氣弱則經絡肉分之間血多留滯累日不散則骨節不利筋脉引急故腰背不得轉側手脚不能動摇身熱頭痛也若醫以為傷寒治之則汗出而筋脉動惕手足厥冷變生他病但服趂痛散以黙除之趂痛散牛膝當歸桂去皮白术黄耆獨活生薑各半兩薤白甘草炙各一分右為粗末毎服兩半水五盞煎至二盞去滓熱服一盞陳言評曰趂痛散不特治産後氣弱血滯兼能治太陽經感風頭疼腰背痛自汗發熱若其感寒傷食憂恐驚怒皆致身疼發熱頭痛况有蓐勞諸證尤甚趂痛散皆不能療不若五積散入醋煎用却不妨五積方見第六論第十二論曰産後大便秘澀者何答曰産卧水血俱下腸胃虛竭津液不足是以大便秘澀不通也若過五六日腹中悶脹者此有燥糞在藏府以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱而投以寒藥則陽消隂長變動百出性命危也麻仁丸麻仁研枳殻炙人參大黄各半兩右為末鍊蜜丸梧桐子大空心溫湯下二十丸未通加丸數陳言評曰産後不得利利者百無一生去血過多藏燥大便秘澀澀則固當滑之大黄似難輕用惟蔥涎調蠟茶為丸復以蔥茶下之必通阿膠枳殻丸治産後虛羸大便秘澀阿膠枳殻麪炒去瓤等分右為末蜜丸如梧子大别硏滑石為衣溫酒下二十丸半日來未通再服第十三論曰産後血崩者何答曰産卧傷耗經絡未得平復而勞役損動致血暴崩下淋瀝不止或因醎酸不節傷蠧榮衞氣衰血弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以止之固經丸艾葉赤石脂補骨脂炒木賊各半兩附子一枚炮去皮臍右為末陳米飲和丸桐子大食前溫酒下二十丸米飲亦得陳言評曰血崩不是輕病况産後有此是謂重傷恐不止鹹酸不節而能致之多因憂驚恐恚藏氣不平或産後服斷血藥早致惡血不散鬱滿作堅亦成崩中固經丸似難責效不若大料煮芎藭當歸加芍藥湯候定續次隨證合諸藥治之為得芎藭𣪚治産後去血過多暈悶不省及傷胎去血多不止懸虛心煩眩暈頭重目昬耳聾舉頭欲倒諸證芎藭當歸洗去土焙乾各等分右剉為散毎四鍼水一盞半煎七分去渣熱服第十四論曰産後腹脹悶滿嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微而成腹脹胃受之則不得受納水穀而生吐逆醫者不識若以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服抵勝湯必瘥抵勝湯赤芍藥半夏湯洗七次澤蘭葉人參陳皮各二錢甘草炙一錢右㕮咀作一劑水三碗薑半兩煎至兩盞去渣服按陳言第十四論評缺第十五論曰産後口鼻黒氣起及鼻衂者何答曰陽明者經脉之海起於鼻交頞中還出挾口交人中左之右右之左産後氣消血散榮衞不理散亂入於諸經却還不得故令口鼻黒起及變鼻衂此緣産後虚熱變生此疾其疾不可治名曰胃絶肺敗不出方按陳言第十五論評缺第十六論曰産後喉中氣急喘者何答曰榮者血也衞者氣也榮行脉中衞行脉外相隨上下謂之榮衞因産所下過多榮血暴竭衞氣無主獨聚於肺中故令喘也此名孤陽絶隂為難治若惡露不快敗血停凝上薰於肺亦令喘急如此但服奪命丹血出喘息自定奪命丹方見第三論陳言評曰産後喘急固可畏若是敗血上薰於肺猶可責效奪命丹若感風寒或因憂怒飲食鹹冷等奪命丹未可均濟况孤陽絶隂乎若榮血暴絶宜大料煮芎藭湯亦自可救傷風寒宜旋覆花湯性理鬱發宜小調經散用桑白皮杏仁煎湯調下傷食宜見睍丸五積散見睍丸見第五論五積散見第六論芎藭湯見第十三論小調經散缺或即第七論中調經散旋覆花湯治産後傷感風寒暑濕欬嗽喘滿痰涎壅塞坐卧不安寧旋覆花赤芍藥半夏麯前胡麻黄去根節荆芥穗五味子甘草炙茯苓杏仁各等分右㕮咀毎服四錢水一盞半薑五片棗一個煎七分去渣空心服第十七論曰産後中風者何答曰産後五七日内强力下床或一月之内傷於房室或懐憂發怒擾蕩冲和或因着炙傷動藏府得病之初眼澀口噤肌肉瞤搐以漸腰脊筋急强直者不可治此乃人作非偶爾中風所得也陳言評曰問産後中風風是外邪血虚則或有中之者宜答以人作不可治問答不相領解如何開示後人立論之難有如此者若是中風當以脉辨看在何藏依經調之强力下床月内房室憂愁着炙非因風類蓐勞性氣火邪治各有法非産後病不暇繁引學者識之第十八論曰産後心痛者何答曰心者血之主人有伏宿寒因産大虛寒搏於血血凝不得消散其氣逆上衝繫於心之絡脉故心痛但以大巖蜜湯治之寒去則血脉溫而經絡通心痛自止若誤以為所傷療之則虚極寒益甚矣心絡寒甚傳之正經則變為真心痛朝發夕死夕發朝死藥不可輕用如此大巖蜜湯熟地當歸獨活吳茱萸湯泡乾薑炮芍藥桂心甘草炙小草各一兩細辛半兩右剉為散毎服半兩水三大盞煎至一盞去渣微熱服陳言評曰産後心痛雖非産蓐常病庸或有之凡痛未必便是血痛設是巖蜜湯豈可用熟地黄等藥泥血安能去痛此方本出千金用生乾地黄吳茱萸一升合准五兩乾薑三兩細辛治陳寒在下焦方本一兩却减作半兩制竒制偶量病淺深自有品數不可妄意加减然以巖蜜湯治血痛不若失笑散用之更效失笑散治心腹欲死百藥不效服此頓愈五靈脂蒲黄微炒各等分右為細末先用釅醋調二錢熬成膏入水一盞煎七分食前熱服第十九論曰産後熱悶氣上轉為脚氣者何答曰産卧血虚生熱復因春夏取凉過多地之蒸濕因足履之所以著而為脚氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也服小續命湯兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益増劇小續命湯麻黄去節湯泡防己人參黄芩桂心甘草炙白芍川芎各一兩杏仁一兩泡去皮尖炒附子一枚去皮臍炮防風半兩右剉為散毎服四大錢水一盞半薑七片棗二個煎七分去渣不拘時服陳言評曰脚氣固是常病未聞産後能轉為者往往讀千金見産婦多此疾之語便出是證文辭害意可槩見矣是熱悶氣上如何令服續命湯此藥本主少陽經中風非均治諸經脚氣須要依脚氣方論隂陽經絡調之此渉専悶門未易輕論既非産後要病更不繁引第二十論曰産後汗出多而變痙風者何答曰産後血虛肉理不宻故多汗因遇風邪搏之則變痙風也痙者口噤不開背强而直或發癎狀摇頭馬鳴身反折須臾十發氣息如絲宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治小續命湯見第十九論陳言評曰産後汗出多變痙痓亦令服續命湯此又難信既汗多如何更服麻黄官桂防己黄芩輩不若大豆紫湯為佳太醫局方大聖散亦良藥也大豆紫湯治中風頭眩惡風治汗吐冷水及産後有病中風痱痙背强口噤直視煩熱獨活一兩半大豆半升酒三升右先浸獨活煎一二沸别炒大豆極焦烟出急投酒蜜封候冷去豆每服一二合許得少汗則愈日數十服此藥能去風消血結如姙娠拆傷貽死腹中服此得瘥大聖散方缺第二十一論曰産後所下過多虛極生風者何答曰婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾此但虚極生風也如此急服濟危上丹神良若以風藥治之則誤矣濟危上丹乳香五靈脂硫黄研大隂𤣥精石研陳皮去白桑寄生真阿膠炙擣卷柏生等分右將上四味同研匀石器内微火上炒勿令焦再研極細後入餘藥末用地黄汁糊丸梧桐子大産後溫酒下二十丸當歸酒亦得陳言評曰所下過多傷損虚竭少氣唇青肉冷汗出神昏此皆虚脫證何以謂之生風風是外滛必自感冒中傷經絡然後發動藏府豈能自生風也風虛之說蓋因脉經云浮為風為虛此乃兩病合說在人迎則為風在氣口則為虛後學無識便謂風虛是一病謬濫之甚學者當知
